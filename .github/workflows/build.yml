name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Create base Flutter project
        run: |
          flutter create \
            --org com.hichamozor \
            --project-name prompteur_video \
            --platforms android \
            /tmp/app

      - name: Apply custom source files
        run: |
          rm -rf /tmp/app/lib/
          cp -r lib/ /tmp/app/lib/
          cp pubspec.yaml /tmp/app/pubspec.yaml
          cp android/app/src/main/AndroidManifest.xml \
             /tmp/app/android/app/src/main/AndroidManifest.xml

      - name: Flutter pub get
        working-directory: /tmp/app
        run: flutter pub get

      - name: Build release APK
        working-directory: /tmp/app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prompteur-video-v1.0
          path: /tmp/app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
